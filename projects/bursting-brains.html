  <!-- LIGHTBOX OVERLAY -->
  <div class="lightbox-overlay" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="lightbox-inner">
      <button class="lightbox-prev" id="lightbox-prev" aria-label="Previous">
        <span class="btn-circle"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></span>
      </button>
      <div id="lightbox-img-wrap">
        <img id="lightbox-img" src="" alt="" />
        <p id="lightbox-caption"></p>
      </div>
      <button class="lightbox-next" id="lightbox-next" aria-label="Next">
        <span class="btn-circle"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></span>
      </button>
    </div>
  </div>

  <script>
    (function () {
      const overlay   = document.getElementById('lightbox');
      const lbImg     = document.getElementById('lightbox-img');
      const lbCaption = document.getElementById('lightbox-caption');
      const closeBtn  = document.getElementById('lightbox-close');
      const prevBtn   = document.getElementById('lightbox-prev');
      const nextBtn   = document.getElementById('lightbox-next');

      let currentGroup = null;
      let currentIndex = 0;
      let captionTimer = null;

      const gridSelectors = '.block-image-grid img, .block-image-grid-3 img, .block-image-grid-4 img, .block-image-grid-5 img';
      const gridParents   = '.block-image-grid, .block-image-grid-3, .block-image-grid-4, .block-image-grid-5';

      function getCaption(img) {
        if (img.dataset.caption) return img.dataset.caption;
        const fig = img.closest('figure');
        if (fig) { const cap = fig.querySelector('figcaption'); if (cap) return cap.textContent.trim(); }
        return '';
      }

      function showCaption(img) {
        const text = getCaption(img);
        lbCaption.textContent = text;
        lbCaption.style.opacity = '0';
        if (captionTimer) clearTimeout(captionTimer);
        if (text) {
          captionTimer = setTimeout(function () {
            lbCaption.style.opacity = '1';
          }, 30);
        }
      }

      function open(img) {
        const parent = img.closest(gridParents);
        if (parent) {
          currentGroup = Array.from(parent.querySelectorAll('img'));
          currentIndex = currentGroup.indexOf(img);
        } else {
          currentGroup = null;
          currentIndex = 0;
        }
        lbImg.src = img.src;
        lbImg.alt = img.alt || '';
        showCaption(img);
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
        updateArrows();
      }

      function updateArrows() {
        const show = currentGroup && currentGroup.length > 1;
        prevBtn.style.display = show ? 'flex' : 'none';
        nextBtn.style.display = show ? 'flex' : 'none';
      }

      function navigate(dir) {
        if (!currentGroup) return;
        currentIndex = (currentIndex + dir + currentGroup.length) % currentGroup.length;
        lbImg.src = currentGroup[currentIndex].src;
        lbImg.alt = currentGroup[currentIndex].alt || '';
        showCaption(currentGroup[currentIndex]);
        updateArrows();
      }

      function close() {
        overlay.classList.remove('active');
        document.body.style.overflow = '';
        if (captionTimer) { clearTimeout(captionTimer); captionTimer = null; }
        setTimeout(() => { lbImg.src = ''; lbCaption.textContent = ''; lbCaption.style.opacity = '0'; }, 200);
      }

      document.querySelectorAll('.block-image img, ' + gridSelectors)
        .forEach(function (img) {
          img.addEventListener('click', function () { open(img); });
        });

      overlay.addEventListener('click', function (e) {
        if (e.target === overlay || e.target.classList.contains('lightbox-inner')) close();
      });

      closeBtn.addEventListener('click', close);
      prevBtn.addEventListener('click', function (e) { e.stopPropagation(); navigate(-1); });
      nextBtn.addEventListener('click', function (e) { e.stopPropagation(); navigate(1); });

      document.addEventListener('keydown', function (e) {
        if (!overlay.classList.contains('active')) return;
        if (e.key === 'Escape')     close();
        if (e.key === 'ArrowLeft')  navigate(-1);
        if (e.key === 'ArrowRight') navigate(1);
      });
    })();
  </script>
